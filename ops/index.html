<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Private</title>
<style>
  :root{--bg:#15130f;--panel:#1e1b16;--ink:#ece7dd;--dim:#a49d8f;--accent:#e2894c;--line:#332e25;--bad:#d98a6a}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);color:var(--ink);
    font:16px/1.6 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}
  .box{width:min(92vw,420px);background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:30px 28px;text-align:center;
    box-shadow:0 10px 40px rgba(0,0,0,.4)}
  .lock{font-size:30px}
  h1{font-size:20px;margin:12px 0 4px}
  p{color:var(--dim);font-size:14px;margin:0 0 20px}
  input{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:10px;background:var(--bg);color:var(--ink);
    font-size:16px;text-align:center;letter-spacing:.04em}
  input:focus{outline:0;border-color:var(--accent)}
  button{width:100%;margin-top:12px;padding:12px;border:0;border-radius:10px;background:var(--accent);color:#1a1206;
    font:700 15px -apple-system,sans-serif;cursor:pointer}
  button:hover{opacity:.92}
  .err{color:var(--bad);font-size:13.5px;margin-top:12px;min-height:18px}
  .hint{color:var(--dim);font-size:12px;margin-top:18px;opacity:.7}
</style>
</head>
<body>
  <div class="box">
    <div class="lock">🔒</div>
    <h1>Private console</h1>
    <p>Trent's job-search operations. Enter your passphrase.</p>
    <form id="f" onsubmit="return unlock(event)">
      <input id="pw" type="password" autocomplete="current-password" autofocus placeholder="Passphrase" aria-label="Passphrase">
      <button type="submit" id="btn">Unlock</button>
    </form>
    <div class="err" id="err"></div>
    <div class="hint">Contents are AES-encrypted. The passphrase is checked in your browser and never sent anywhere.</div>

  function b64ToBuf(b){ const s=atob(b); const u=new Uint8Array(s.length); for(let i=0;i<s.length;i++)u[i]=s.charCodeAt(i); return u; }
  async function tryDecrypt(pass){
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey('raw',enc.encode(pass),'PBKDF2',false,['deriveKey']);
    const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64ToBuf(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64ToBuf(IV)},key,b64ToBuf(PAYLOAD));
    return new TextDecoder().decode(pt);
  }
  async function unlock(e){
    e.preventDefault();
    const err=document.getElementById('err'), btn=document.getElementById('btn');
    const pass=document.getElementById('pw').value;
    err.textContent=''; btn.textContent='Unlocking…'; btn.disabled=true;
    try{
      const html=await tryDecrypt(pass);
      document.open(); document.write(html); document.close();
    }catch(ex){
      err.textContent='Wrong passphrase — try again.';
      btn.textContent='Unlock'; btn.disabled=false;
      document.getElementById('pw').select();
    }
    return false;
  }
